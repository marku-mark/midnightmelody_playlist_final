<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Dusk Sessions - Playlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background glow blobs -->
  <div class="ambient">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page">

    <!-- ══ LEFT / TOP PANEL ══════════════════════════ -->
    <aside class="panel-left">

      <!-- On mobile: cover + header sit side by side -->
      <div class="mobile-top">

        <!-- Cover photo (full bleed) -->
        <div class="cover-grid" id="coverGrid">
          <img class="cover-photo" src="playlist_cover/cover.jpg" alt="Forest Dusk" id="coverPhoto" />

        </div>

        <!-- Badge, title, creator -->
        <div class="playlist-header">
          <div class="badge"><span class="badge-dot"></span> Playlist</div>
          <div class="playlist-title" id="playlistTitle"></div>
          <div class="playlist-meta">
            <span class="creator-avatar">&#x1F33F;</span>
            <span id="playlistMeta"></span>
          </div>
        </div>

      </div><!-- /mobile-top -->

      <!-- Transport controls: Shuffle / Play / Repeat -->
      <div class="transport-bar">
        <div class="transport-btn-wrap">
          <button class="btn-transport" id="btnTransportBack" aria-label="Previous" title="Previous track">
            <!-- skip-back icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="5" x2="5" y2="19"></line>
              <polygon points="19 4 9 12 19 20 19 4"></polygon>
            </svg>
          </button>
          <span class="transport-label">Back</span>
        </div>

        <div class="transport-btn-wrap">
          <button class="btn-transport" id="btnShuffle" aria-label="Shuffle" title="Shuffle">
            <!-- shuffle icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"></polyline>
              <line x1="4" y1="20" x2="21" y2="3"></line>
              <polyline points="21 16 21 21 16 21"></polyline>
              <line x1="15" y1="15" x2="21" y2="21"></line>
            </svg>
          </button>
          <span class="transport-label">Shuffle</span>
        </div>

        <div class="transport-btn-wrap">
          <button class="btn-transport-play" id="btnTransportPlay" aria-label="Play all">&#9654;</button>
          <span class="transport-label">Play</span>
        </div>

        <div class="transport-btn-wrap">
          <button class="btn-transport" id="btnRepeat" aria-label="Repeat" title="Repeat">
            <!-- repeat icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
          </button>
          <span class="transport-label">Repeat</span>
        </div>

        <div class="transport-btn-wrap">
          <button class="btn-transport" id="btnTransportNext" aria-label="Next" title="Next track">
            <!-- skip-forward icon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"></polygon>
              <line x1="19" y1="5" x2="19" y2="19"></line>
            </svg>
          </button>
          <span class="transport-label">Next</span>
        </div>
      </div>

      <!-- Audio player bar (hidden until a track is clicked) -->
      <div class="player-bar" id="playerBar">
        <div class="player-disc" id="playerDisc">
          <img id="playerArt" src="" alt="" />
          <span id="playerEmoji">&#x1F3B5;</span>
        </div>
        <div class="player-info">
          <div class="player-song"   id="playerSong">Select a track</div>
          <div class="player-artist" id="playerArtist">&mdash;</div>
          <div class="progress-wrap">
            <span class="time-label" id="timeElapsed">0:00</span>
            <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100" step="0.1" />
            <span class="time-label" id="timeDuration">0:00</span>
          </div>
        </div>
        <button class="btn-play" id="btnPlay" aria-label="Play">&#9654;</button>
      </div>

    </aside>

    <!-- ══ RIGHT / BOTTOM PANEL: full track list ═════ -->
    <main class="panel-right">

      <!-- Column labels -->
      <div class="tracks-header">
        <span class="col-num">#</span>
        <span class="col-title">Title</span>
        <span class="col-dur">Time</span>
      </div>

      <div class="divider"></div>

      <!-- Scrollable track list container -->
      <div class="track-list-scroll" id="trackListScroll">
        <!-- Track rows built by JS -->
        <div class="track-list" id="trackList"></div>

        <!-- "Showing X of Y songs" -->
        <div class="total-info" id="totalInfo"></div>
      </div>

    </main>

  </div><!-- /page -->

  <!-- ══ PAGE FOOTER — Share button + branding ═════ -->
  <footer class="page-footer">
    <div class="footer-divider"></div>
    <button class="btn-share" id="shareBtn">
      <span>&#x2191;</span> Share Playlist
    </button>
    <div class="footer-brand"><strong>midnightmelody</strong> by grace ann</div>
  </footer>

  <!-- HTML5 audio engine (invisible) -->
  <audio id="audioEngine" preload="metadata"></audio>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
